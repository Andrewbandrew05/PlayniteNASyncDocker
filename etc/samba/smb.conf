[global]
   workgroup = WORKGROUP
   server string = PlayniteNASync
   security = user
   map to guest = Bad User
   dns proxy = no

   # SMB Multichannel - allows multiple parallel TCP connections for max throughput
   server multi channel support = yes

   # Async I/O - essential for NVMe speeds, don't buffer small reads/writes
   aio read size = 1
   aio write size = 1

   # Use kernel sendfile() syscall - bypasses userspace copy, much faster
   use sendfile = yes

   #add an env in unraid so users can define this

   # Socket tuning for high-speed transfers
   socket options = TCP_NODELAY IPTOS_LOWDELAY SO_RCVBUF=524288 SO_SNDBUF=524288

   # Large SMB transfer units to take advantage of jumbo frames
   max xmit = 65535
   read raw = yes
   write raw = yes

   # SMB3 is required for multichannel - disable older insecure protocols
   server min protocol = SMB3

[PlayniteNASync]
   path = /cache
   writable = yes
   browseable = yes
   guest ok = yes
   force user = root